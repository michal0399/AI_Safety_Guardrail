version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: safetyguardrail-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: safetyguardrail-app
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PII_SERVICE_API_KEY=${PII_SERVICE_API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - API_KEY_SECRET=${API_KEY_SECRET}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
