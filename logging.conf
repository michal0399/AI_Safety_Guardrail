[loggers]
keys=root,safety_guardrail,deepeval_judge,test_suite

[handlers]
keys=console_handler,file_handler,judge_file_handler,error_file_handler

[formatters]
keys=standard_formatter,detailed_formatter,judge_formatter

# ============================================================================
# ROOT LOGGER
# ============================================================================
[logger_root]
level=DEBUG
handlers=console_handler,file_handler

# ============================================================================
# SAFETY GUARDRAIL LOGGER
# ============================================================================
[logger_safety_guardrail]
level=INFO
handlers=console_handler,file_handler
qualname=safety_guardrail
propagate=1

# ============================================================================
# DEEPEVAL JUDGE LOGGER (LLM-as-a-Judge Results)
# ============================================================================
[logger_deepeval_judge]
level=INFO
handlers=console_handler,judge_file_handler
qualname=deepeval_judge
propagate=0

# ============================================================================
# TEST SUITE LOGGER
# ============================================================================
[logger_test_suite]
level=DEBUG
handlers=console_handler,file_handler,judge_file_handler,error_file_handler
qualname=test_suite
propagate=0

# ============================================================================
# CONSOLE HANDLER (INFO level - visible in terminal)
# ============================================================================
[handler_console_handler]
class=StreamHandler
level=INFO
formatter=standard_formatter
args=(sys.stdout,)

# ============================================================================
# FILE HANDLER (General test and application logs)
# ============================================================================
[handler_file_handler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailed_formatter
args=('logs/test_suite.log', 'a', 10485760, 5)

# ============================================================================
# JUDGE FILE HANDLER (LLM-as-a-Judge evaluation results)
# ============================================================================
[handler_judge_file_handler]
class=handlers.RotatingFileHandler
level=INFO
formatter=judge_formatter
args=('logs/judge_results.log', 'a', 5242880, 3)

# ============================================================================
# ERROR FILE HANDLER (Errors and warnings only)
# ============================================================================
[handler_error_file_handler]
class=handlers.RotatingFileHandler
level=WARNING
formatter=detailed_formatter
args=('logs/errors.log', 'a', 5242880, 3)

# ============================================================================
# STANDARD FORMATTER (Console output - concise)
# ============================================================================
[formatter_standard_formatter]
format=%(levelname)-8s | %(name)-20s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S

# ============================================================================
# DETAILED FORMATTER (File output - comprehensive)
# ============================================================================
[formatter_detailed_formatter]
format=%(asctime)s | %(levelname)-8s | %(name)-20s | %(funcName)-20s | %(lineno)4d | %(message)s
datefmt=%Y-%m-%d %H:%M:%S

# ============================================================================
# JUDGE FORMATTER (LLM-as-a-Judge results - formatted for readability)
# ============================================================================
[formatter_judge_formatter]
format=
    [%(asctime)s] Judge: %(name)s
    %(message)s
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
datefmt=%Y-%m-%d %H:%M:%S

# ============================================================================
# CONFIGURATION OPTIONS
# ============================================================================
# Change log levels here to control what gets logged:
#
# CONSOLE_LEVEL: INFO (minimal), DEBUG (verbose)
# FILE_LEVEL:    DEBUG (all events), INFO (important only)
# JUDGE_LEVEL:   INFO (judge results), DEBUG (detailed judge reasoning)
# ERROR_LEVEL:   WARNING (warnings + errors), ERROR (errors only)
#
# To disable logging to a specific destination, remove it from the
# handler list in the corresponding logger section above.
# ============================================================================
