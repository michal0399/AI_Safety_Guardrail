[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests across components
    positive: Happy path tests with valid inputs
    negative: Edge cases and invalid input tests
    regression: Regression tests for previously fixed issues
    security: Security-focused tests (PII leakage, injection attacks)
    performance: Performance and efficiency tests
    slow: Tests that are slow (may skip with -m "not slow")
    judge: Tests using LLM-as-a-judge evaluation

# Plugins
python_paths = tests
plugins = pytest_logging_plugin

# Output options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options
[coverage:run]
source = src/safety_guardrail
omit =
    */tests/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
